name: demo-2
on:
    workflow_dispatch:

jobs:
    job_1:
        runs-on: ubuntu-latest
        outputs:
            data: "${{steps.step_id.outputs.data_in}}"
        steps:
            - id: step_id
              run: echo "data_in=1" >> $GITHUB_OUTPUT # Set output variable 'data' to '1'

    job_2:
        runs-on: ubuntu-latest
        needs: job_1
        outputs:
            data: "${{steps.step_id.outputs.data_in}}"
        steps:
            - id: step_id
              run: echo "data_in=2" >> $GITHUB_OUTPUT # Set output variable 'data' to '2'

    job_3:
        runs-on: ubuntu-latest
        needs: [job_1, job_2]
        steps:
            - name: send mail
              if: "needs.job_1.outputs.data == '1' && needs.job_2.outputs.data == '2'"
              uses: dawidd6/action-send-mail@v3
              with:
                  server_address: smtp.example.com
                  server_port: 587
                  username: ${{ secrets.EMAIL_USERNAME }}
                  password: ${{ secrets.EMAIL_PASSWORD }}
                  subject: "Output Sum Alert"
                  body: "The sum of outputs from job_1 and job_2 is 3."
                  to: ${{ secrets.EMAIL_RECIPIENT }}
                  from: ${{ secrets.EMAIL_SENDER }}
